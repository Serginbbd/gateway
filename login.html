<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Gateway</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <section class="auth-left">
    <div class="auth-illustration">
      <div class="auth-circle">G</div>
      <h2>Explore soluções que trabalham para o seu negócio</h2>
      <p>Pagamentos, cobranças, Pix e integrações em poucos cliques.</p>
    </div>
  </section>

  <section class="auth-right">
    <div class="auth-card">
      <div class="auth-logo">GATEWAY</div>

      <h1>Acesse sua conta</h1>

      <form id="loginForm">
        <label>E-mail</label>
        <input type="email" id="email" required>

        <label>Senha</label>
        <input type="password" id="password" required>

        <a href="#">Esqueci minha senha</a>

        <button type="submit">Acessar conta</button>
      </form>

      <small>Primeira vez por aqui? <a href="register.html">Crie sua conta</a></small>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
